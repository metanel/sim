    ensure(); // לשחרר אודיו במגע הראשון (מדיניות autoplay)
    var tgt = e.target;
    if (!tgt || !tgt.closest) return;
    if (tgt.closest("#__sfx_toggle")) return; // כפתור ההשתקה מטפל בעצמו
    var btn = tgt.closest('button,[role="button"],a');
    if (!btn) return;
    switch (classify(btn)) {
      case "locked": S.error(); vibe(55); break;
      case "lead":   S.lead();  vibe(15); break;
      case "dial":   S.dial();  vibe([20, 40, 20]); break;
      case "sale":   S.success(); vibe([30, 40, 80]); break;
      case "on":     S.on();    vibe(12); break;
      case "off":    S.off();   vibe(12); break;
      default:       S.tick();  vibe(8);
    }
  }, true);

  // ---- צליל "קופה" כשההכנסות עולות ----
  var lastRev = null, revEl = null, queued = false, lastScan = 0;
  function findRev() {
    var els = document.querySelectorAll("p,span,div");
    for (var i = 0; i < els.length; i++) {
      var n = els[i];
      if (n.children.length === 0 && n.textContent && n.textContent.indexOf("סה״כ הכנסות") !== -1) {
        var h = n.nextElementSibling;
        if (h && /\d/.test(h.textContent)) return h;
        var p = n.parentElement;
        if (p) { var h2 = p.querySelector("h2"); if (h2) return h2; }
        return null;
      }
    }
    return null;
  }
  function getRev() { if (revEl && revEl.isConnected) return revEl; revEl = findRev(); return revEl; }
  function readRev() {
    try { var el = getRev(); if (!el) return null;
      var d = (el.textContent || "").replace(/[^\d]/g, ""); return d ? parseInt(d, 10) : null;
    } catch (e) { return null; }
  }
  function checkRev() {
    queued = false;
    var v = readRev();
    if (v == null) return;
    if (lastRev != null && v > lastRev) { S.coin(); vibe([12, 28, 12]); }
    lastRev = v;
  }
  try {
    new MutationObserver(function () {
      if (queued) return; queued = true;
      var wait = Math.max(0, 120 - (Date.now() - lastScan));
      setTimeout(function () { lastScan = Date.now(); requestAnimationFrame(checkRev); }, wait);
    }).observe(document.body, { subtree: true, childList: true, characterData: true });
  } catch (e) {}
  setTimeout(function () { if (lastRev == null) lastRev = readRev(); }, 800);

  // ---- כפתור השתקה צף ----
  var btn = document.createElement("button");
  btn.id = "__sfx_toggle"; btn.type = "button";
  btn.setAttribute("aria-label", "השתק או הפעל סאונד");
  btn.textContent = "🔊";
  btn.style.cssText = "position:fixed;bottom:14px;left:14px;z-index:2147483000;width:42px;height:42px;border-radius:50%;border:none;background:rgba(20,20,22,.62);color:#fff;font-size:19px;line-height:42px;text-align:center;cursor:pointer;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);box-shadow:0 2px 10px rgba(0,0,0,.3);padding:0;user-select:none;-webkit-tap-highlight-color:transparent;transition:transform .12s,opacity .2s;opacity:.85;";
  btn.addEventListener("pointerdown", function (ev) { ev.stopPropagation(); });
  btn.addEventListener("click", function (ev) {
    ev.stopPropagation();
    muted = !muted;
    btn.textContent = muted ? "🔇" : "🔊";
    btn.style.opacity = muted ? "0.55" : "0.85";
    if (muted) {
      try { if (navigator.vibrate) navigator.vibrate(0); } catch (e) {}
      if (master) { try { master.gain.value = 0; } catch (e) {} }
    } else {
      ensure();
      if (master) { try { master.gain.value = DEFAULT_VOL; } catch (e) {} }
      S.tick();
    }
  });
  btn.addEventListener("pointerenter", function () { btn.style.opacity = "1"; });
  btn.addEventListener("pointerleave", function () { btn.style.opacity = muted ? "0.55" : "0.85"; });
  (function mount() { if (document.body) document.body.appendChild(btn); else setTimeout(mount, 200); })();
})();
    </script>
  </body>
</html>
